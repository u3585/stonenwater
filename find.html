<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>전시 검색</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; }
    #search { width: 100%; padding: 8px; font-size: 16px; }
    .result-item { margin-top: 16px; padding: 8px 0; border-bottom: 1px solid #ddd; }
    .result-item a { font-size: 18px; font-weight: bold; text-decoration: none; color: #333; }
    .result-item a:hover { text-decoration: underline; }
    .result-excerpt { font-size: 14px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>전시 검색</h1>
  <input id="search" type="text" placeholder="작가 이름, 전시 제목을 입력하세요" />

  <div id="results"></div>

  <!-- Pagefind 스크립트 불러오기 -->
  <script src="https://u3585.github.io/stonenwater/pagefind/pagefind.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      // Pagefind 초기화
      const pagefind = await window.pagefind.init();

      const searchInput = document.querySelector('#search');
      const resultsContainer = document.querySelector('#results');

      searchInput.addEventListener('input', async (event) => {
        const query = event.target.value.trim();

        // 검색어 없으면 결과 비우기
        if (!query) {
          resultsContainer.innerHTML = '';
          return;
        }

        // 검색 실행
        const search = await pagefind.search(query);

        resultsContainer.innerHTML = '';

        for (const result of search.results) {
          const data = await result.data();

          const item = document.createElement('div');
          item.className = 'result-item';

          item.innerHTML = `
            <a href="${data.url}">${data.meta.title || data.url}</a>
            <div class="result-excerpt">${data.excerpt || ''}</div>
          `;

          resultsContainer.appendChild(item);
        }
      });
    });
  </script>
</body>
</html>
