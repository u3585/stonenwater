<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스톤앤워터 검색엔진</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .item { border-bottom: 1px solid #ddd; padding: 15px 0; display: flex; gap: 20px; }
  .item img { width: 150px; height: auto; border-radius: 8px; }
  .info { max-width: 700px; }
  .title { font-size: 14px; font-weight: bold; }
  .artist { font-size : 12px; color: #555; }
  #noresult { margin-top: 20px; color: red; font-weight: bold; }

  
</style>
</head>
<body>

<h2>보충대리공간 스톤앤워터 검색엔진</h2>

<input type="text" id="search" placeholder="전시명, 작가명, 연도 검색" style="width:300px; padding:8px;">
<button id="btnSearch" style="padding:8px 12px;">검색</button>

<div id="results"></div>
<div id="noresult" style="display:none;">찾을 수 없습니다.</div>

<script>
let exhibitions = [];

// JSON 파일 불러오기
async function loadData() {
    try {
        const response = await fetch("./data/data.json");
        exhibitions = await response.json();
    } catch (e) {
        console.error("JSON 파일을 불러올 수 없습니다.", e);
    }
}

// 검색 실행 함수
function doSearch() {
    const q = document.getElementById("search").value.trim();
    const resultsDiv = document.getElementById("results");
    const noResult = document.getElementById("noresult");

    resultsDiv.innerHTML = "";
    noResult.style.display = "none";

    if (!q) return;

  function formatArtists(artistString, keyword) {
    const artists = artistString.split(",").map(a => a.trim());
    const index = artists.findIndex(a => a.includes(keyword));

    // 검색어가 없으면 원본 그대로 반환
    if (index === -1) return artistString;

    // 검색된 작가를 맨 앞으로 이동
    const mainArtist = artists[index];
    const nextArtists = artists.slice(index + 1, index + 3); // 뒤로 2명만
    const remainingCount = artists.length - (1 + nextArtists.length);

    // 검색된 작가만 볼드 처리
    const highlightedMain = mainArtist.replace(
        new RegExp(keyword, "gi"),
        match => `<b>${match}</b>`
    );

    let result = [highlightedMain, ...nextArtists].join(", ");

    if (remainingCount > 0) {
        result += `,  외 ${remainingCount}명`;
    }

    return result;
}

const lowerQ = q.toLowerCase();
const results = exhibitions.filter(item =>
    (item.year && String(item.year).toLowerCase().includes(lowerQ)) ||
    (item.title && item.title.toLowerCase().includes(lowerQ)) ||
    (item.artist && item.artist.toLowerCase().includes(lowerQ)) ||
               
        (item.keywords && item.keywords.some(k => k.includes(q)))
    );

    if (results.length === 0) {
        noResult.style.display = "block";
        return;
    }

    results.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            
            <div class="info">
                <div class="year">전시연도 : ${item.year}</div>
                <div class="title">전시제목 : <a href="${item.url}" target="_blank">${item.title}</a></div>
                <div class="artist">${formatArtists(item.artist, q)}</div>
              
                
            </div>
        `;

        resultsDiv.appendChild(div);
    });
}

// 버튼 클릭 시 검색
document.getElementById("btnSearch").addEventListener("click", doSearch);

// 엔터키로 검색
document.getElementById("search").addEventListener("keypress", function(e) {
    if (e.key === "Enter") doSearch();
});

loadData();
</script>

</body>
</html>
