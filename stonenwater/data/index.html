<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JSON 데이터 불러오기 예제</title>
    <style>
        /* 예쁘게 보이기 위한 간단한 디자인(CSS) */
        body { font-family: sans-serif; padding: 20px; }
        .user-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .user-card h3 { margin: 0 0 5px 0; color: #333; }
        .user-card p { margin: 0; color: #666; }
    </style>
</head>
<body>

    <h1>🚀 우리 팀원 소개</h1>
    <button id="load-btn">데이터 불러오기</button>
    
    <hr>

    <!-- 요리사(JS)가 완성된 음식을 올려둘 빈 식탁입니다 -->
    <div id="data-container">
        <p>버튼을 누르면 이곳에 데이터가 표시됩니다.</p>
    </div>

    <!-- 가장 아래에서 요리사(script.js)를 부릅니다 -->
    <script src="script.js"></script>
</body>
</html>
