<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>전시 검색</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .item { border-bottom: 1px solid #ddd; padding: 15px 0; display: flex; gap: 20px; }
  .item img { width: 150px; height: auto; border-radius: 8px; }
  .info { max-width: 600px; }
  .title { font-size: 20px; font-weight: bold; }
  .artist { color: #555; }
  #noresult { margin-top: 20px; color: red; font-weight: bold; }
</style>
</head>
<body>

<h2>전시 검색</h2>

<input type="text" id="search" placeholder="전시명, 작가명, 연도 검색" style="width:300px; padding:8px;">
<button id="btnSearch" style="padding:8px 12px;">검색</button>

<div id="results"></div>
<div id="noresult" style="display:none;">찾을 수 없습니다.</div>

<script>
let exhibitions = [];

// JSON 파일 불러오기
async function loadData() {
    try {
        const response = await fetch("./data/data1.json");
        exhibitions = await response.json();
    } catch (e) {
        console.error("JSON 파일을 불러올 수 없습니다.", e);
    }
}

// 검색 실행 함수
function doSearch() {
    const q = document.getElementById("search").value.trim();
    const resultsDiv = document.getElementById("results");
    const noResult = document.getElementById("noresult");

    resultsDiv.innerHTML = "";
    noResult.style.display = "none";

    if (!q) return;

    const results = exhibitions.filter(item =>
        (item.title && item.title.includes(q)) ||
        (item.artist && item.artist.includes(q)) ||
        (item.year && String(item.year).includes(q)) ||
        (item.keywords && item.keywords.some(k => k.includes(q)))
    );

    if (results.length === 0) {
        noResult.style.display = "block";
        return;
    }

    results.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <img src="${item.image}" alt="${item.title}">
            <div class="info">
                <div class="title">${item.title}</div>
                <div class="artist">${item.artist}</div>
                <div class="year">${item.year}</div>
                <div class="period">${item.period}</div>
            </div>
        `;

        resultsDiv.appendChild(div);
    });
}

// 버튼 클릭 시 검색
document.getElementById("btnSearch").addEventListener("click", doSearch);

// 엔터키로 검색
document.getElementById("search").addEventListener("keypress", function(e) {
    if (e.key === "Enter") doSearch();
});

loadData();
</script>

</body>
</html>
